<!-- public/book.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking System | Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">BookingApp</a>
        <div class="nav-links">
            <button id="theme-toggle" class="btn btn-outline" onclick="toggleTheme()" style="padding: 0.5rem; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center;" title="Toggle Dark Mode">🌙</button>
            <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            <button onclick="handleLogout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Book Appointment</h2>
            <div id="alert-box" class="alert"></div>

            <form id="booking-form" onsubmit="handleBooking(event)">
                <div class="form-group">
                    <label>Service Type</label>
                    <select id="service" required>
                        <option value="">Select a service</option>
                        <option value="Consultation">Consultation</option>
                        <option value="Checkup">Checkup</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Therapy Session">Therapy Session</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="time" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
            // Set min date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').setAttribute('min', today);
        });
    </script>
</body>
</html>
